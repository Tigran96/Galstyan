<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 5 – Parents Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Outfit', 'Inter', sans-serif;
    background: #060d1f;
    display: flex; align-items: center; justify-content: center;
  }

  .canvas {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
  }

  .glow1 {
    position: absolute; top: -100px; left: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute; bottom: -100px; right: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  }

  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0ea5e9, #818cf8, #0ea5e9);
  }

  /* Emoji hero */
  .hero-emoji {
    z-index: 1; font-size: 88px; margin-bottom: 28px; line-height: 1;
  }

  /* Tag */
  .tag {
    z-index: 1;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(250,204,21,0.12); border: 1px solid rgba(250,204,21,0.3);
    border-radius: 999px; padding: 8px 22px;
    color: #fde68a; font-size: 18px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 28px;
  }

  /* Headline */
  .headline {
    z-index: 1; text-align: center; margin-bottom: 20px;
  }
  .headline h1 {
    font-size: 68px; font-weight: 900; line-height: 1.05; letter-spacing: -2px;
    background: linear-gradient(135deg, #ffffff 0%, #bae6fd 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .headline p {
    font-size: 24px; color: #64748b; margin-top: 12px; font-weight: 500;
  }

  .divider {
    z-index: 1; width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, #0ea5e9, transparent);
    border-radius: 2px; margin: 28px 0;
  }

  /* Plan card */
  .plan-card {
    z-index: 1; width: 100%;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 24px; padding: 36px 44px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .plan-info { }
  .plan-name { font-size: 26px; font-weight: 700; color: white; margin-bottom: 10px; }
  .plan-features { display: flex; flex-direction: column; gap: 8px; }
  .plan-feat {
    font-size: 19px; color: #94a3b8; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
  }
  .plan-feat::before {
    content: '✓'; color: #4ade80; font-weight: 700; font-size: 16px;
  }
  .plan-price {
    text-align: right;
  }
  .plan-amount {
    font-size: 52px; font-weight: 900; color: white; line-height: 1;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .plan-period {
    font-size: 17px; color: #64748b; margin-top: 4px; text-align: right;
  }

  /* Bottom */
  .bottom {
    z-index: 1; display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 40px; }
  .brand-name { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.6); }
  .cta-pill {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    border-radius: 14px; padding: 14px 28px;
    color: white; font-size: 18px; font-weight: 700;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #6366f1, #0ea5e9, #6366f1);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="accent-bar"></div>

  <div class="hero-emoji">👨‍👩‍👧</div>

  <div class="tag">⭐ For Parents</div>

  <div class="headline">
    <h1>Homework Help<br>Every Day</h1>
    <p>Your child never struggles alone again</p>
  </div>

  <div class="divider"></div>

  <div class="plan-card">
    <div class="plan-info">
      <div class="plan-name">Parents Plan</div>
      <div class="plan-features">
        <div class="plan-feat">5 homework tasks solved daily</div>
        <div class="plan-feat">Online support & explanations</div>
        <div class="plan-feat">Math &amp; Physics covered</div>
      </div>
    </div>
    <div class="plan-price">
      <div class="plan-amount">9,000 ֏</div>
      <div class="plan-period">per month</div>
    </div>
  </div>

  <div class="bottom">
    <div class="brand">
      <img src="../public/logo.png" alt="Logo">
      <div class="brand-name">Galstyan Academy</div>
    </div>
    <div class="cta-pill">Start today → +374 94 766-409</div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
