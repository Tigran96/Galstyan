<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 3 – Teacher Spotlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Outfit', 'Inter', sans-serif;
    background: #060d1f;
    display: flex; align-items: center; justify-content: center;
  }

  .canvas {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 72px 80px;
  }

  /* Diagonal split background */
  .bg-split {
    position: absolute; top: 0; right: 0;
    width: 460px; height: 1080px;
    background: linear-gradient(160deg, rgba(14,165,233,0.08) 0%, rgba(99,102,241,0.12) 100%);
    clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%);
  }

  .glow {
    position: absolute; top: 50%; left: 30%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0ea5e9, #818cf8, #0ea5e9);
  }

  /* Top brand */
  .top-brand {
    z-index: 1; display: flex; align-items: center; gap: 14px; margin-bottom: 56px;
  }
  .top-brand img { height: 44px; }
  .top-brand-name { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.7); }

  /* Main content area */
  .content {
    z-index: 1; flex: 1; display: flex; flex-direction: column; justify-content: center;
  }

  .eyebrow {
    color: #7dd3fc; font-size: 18px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ''; display: block; width: 32px; height: 2px;
    background: #0ea5e9; border-radius: 1px;
  }

  .teacher-layout {
    display: flex; align-items: flex-start; gap: 52px;
  }

  .photo-wrap {
    flex-shrink: 0;
  }
  .photo-wrap img {
    width: 280px; height: 280px;
    object-fit: cover; border-radius: 24px;
    border: 3px solid rgba(14,165,233,0.4);
    filter: grayscale(20%);
  }
  .experience-badge {
    margin-top: 16px;
    background: linear-gradient(135deg, rgba(14,165,233,0.2), rgba(99,102,241,0.2));
    border: 1px solid rgba(14,165,233,0.3);
    border-radius: 12px; padding: 10px 16px; text-align: center;
    color: #7dd3fc; font-size: 17px; font-weight: 700;
  }

  .info { flex: 1; }
  .name {
    font-size: 52px; font-weight: 900; color: white; line-height: 1.1;
    letter-spacing: -1.5px; margin-bottom: 8px;
  }
  .role {
    font-size: 22px; font-weight: 600; color: #38bdf8; margin-bottom: 28px;
  }

  .quote {
    font-size: 21px; color: #94a3b8; line-height: 1.6;
    font-style: italic; border-left: 3px solid #0ea5e9;
    padding-left: 20px; margin-bottom: 32px;
  }

  .specialties {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .tag {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 8px 18px;
    color: #e2e8f0; font-size: 17px; font-weight: 600;
  }

  /* Bottom */
  .bottom {
    z-index: 1; padding-top: 32px; margin-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: space-between;
  }
  .phone { color: #64748b; font-size: 20px; display: flex; align-items: center; gap: 8px; }
  .phone span { color: #94a3b8; }
  .cta-pill {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    border-radius: 14px; padding: 14px 28px;
    color: white; font-size: 18px; font-weight: 700;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #6366f1, #0ea5e9, #6366f1);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-split"></div>
  <div class="glow"></div>
  <div class="accent-bar"></div>

  <div class="top-brand">
    <img src="../public/logo.png" alt="Logo">
    <div class="top-brand-name">Galstyan Academy</div>
  </div>

  <div class="content">
    <div class="eyebrow">Meet the Founder</div>

    <div class="teacher-layout">
      <div class="photo-wrap">
        <img src="../public/owner.jpg" alt="Marat Galstyan">
        <div class="experience-badge">30+ Years<br>Experience</div>
      </div>

      <div class="info">
        <div class="name">Marat<br>Galstyan</div>
        <div class="role">Founder · Math & Physics</div>
        <div class="quote">"Every student can reach great heights with the right guidance and support."</div>
        <div class="specialties">
          <span class="tag">📐 Mathematics</span>
          <span class="tag">🧲 Physics</span>
          <span class="tag">📝 SAT / GRE</span>
          <span class="tag">👥 Small Groups</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="phone"><span>📲</span><span>+374 94 766-409</span></div>
    <div class="cta-pill">Book a free trial →</div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
