<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 2 – Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Outfit', 'Inter', sans-serif;
    background: #060d1f;
    display: flex; align-items: center; justify-content: center;
  }

  .canvas {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 72px 80px;
  }

  .glow1 {
    position: absolute; top: -100px; right: -100px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute; bottom: -100px; left: -100px;
    width: 550px; height: 550px; border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0ea5e9, #818cf8, #0ea5e9);
  }

  /* Header */
  .header {
    z-index: 1; text-align: center; margin-bottom: 52px;
  }
  .eyebrow {
    color: #7dd3fc; font-size: 18px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; display: block; width: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, #0ea5e9);
    border-radius: 1px;
  }
  .eyebrow::after { background: linear-gradient(90deg, #0ea5e9, transparent); }
  .header h1 {
    font-size: 56px; font-weight: 900; line-height: 1.1; letter-spacing: -1.5px;
    background: linear-gradient(135deg, #ffffff 0%, #bae6fd 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p {
    margin-top: 12px; font-size: 24px; color: #64748b; font-weight: 500;
  }

  /* KPI grid */
  .kpis {
    z-index: 1; display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px; width: 100%; margin-bottom: 48px;
  }
  .kpi-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px; padding: 36px 24px; text-align: center;
  }
  .kpi-value {
    font-size: 64px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 12px;
  }
  .kpi-label {
    font-size: 18px; color: #94a3b8; font-weight: 500; line-height: 1.4;
  }

  /* Bottom row */
  .bottom {
    z-index: 1; display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding-top: 32px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 44px; }
  .brand-name { font-size: 22px; font-weight: 700; color: white; }
  .cta-pill {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    border-radius: 14px; padding: 16px 32px;
    color: white; font-size: 20px; font-weight: 700;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #6366f1, #0ea5e9, #6366f1);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="accent-bar"></div>

  <div class="header">
    <div class="eyebrow">Real Student Results</div>
    <h1>What Our Students<br>Achieve</h1>
    <p>Measurable progress within weeks</p>
  </div>

  <div class="kpis">
    <div class="kpi-card">
      <div class="kpi-value">+200</div>
      <div class="kpi-label">SAT score points gained</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">−30%</div>
      <div class="kpi-label">Fewer mistakes on tests</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value">+1–2</div>
      <div class="kpi-label">Grade levels up in one term</div>
    </div>
  </div>

  <div class="bottom">
    <div class="brand">
      <img src="../public/logo.png" alt="Logo">
      <div class="brand-name">Galstyan Academy</div>
    </div>
    <div class="cta-pill">Free trial → +374 94 766-409</div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
