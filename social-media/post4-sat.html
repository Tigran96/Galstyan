<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post 4 – SAT/GRE/GMAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Outfit', 'Inter', sans-serif;
    background: #060d1f;
    display: flex; align-items: center; justify-content: center;
  }

  .canvas {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px;
  }

  .glow1 {
    position: absolute; top: -150px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #6366f1, #0ea5e9, #6366f1);
  }

  /* Big test icons */
  .tests {
    z-index: 1; display: flex; gap: 24px; margin-bottom: 48px;
  }
  .test-badge {
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.4);
    border-radius: 16px; padding: 16px 32px;
    font-size: 30px; font-weight: 900; color: #a5b4fc; letter-spacing: 1px;
  }

  /* Headline */
  .headline {
    z-index: 1; text-align: center; margin-bottom: 32px;
  }
  .headline h1 {
    font-size: 72px; font-weight: 900; line-height: 1.0; letter-spacing: -2px;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 50%, #38bdf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .headline p {
    font-size: 26px; color: #64748b; margin-top: 14px; font-weight: 500;
  }

  .divider {
    z-index: 1; width: 80px; height: 3px;
    background: linear-gradient(90deg, transparent, #6366f1, transparent);
    border-radius: 2px; margin: 32px 0;
  }

  /* Features grid */
  .features {
    z-index: 1; display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; margin-bottom: 48px;
  }
  .feat {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px; padding: 22px 28px;
    display: flex; align-items: center; gap: 16px;
  }
  .feat-icon { font-size: 28px; flex-shrink: 0; }
  .feat-text { font-size: 20px; color: #cbd5e1; font-weight: 600; line-height: 1.3; }

  /* Bottom */
  .bottom {
    z-index: 1; display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding-top: 32px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { height: 44px; }
  .brand-name { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.7); }
  .cta-pill {
    background: linear-gradient(135deg, #6366f1, #0ea5e9);
    border-radius: 14px; padding: 16px 32px;
    color: white; font-size: 20px; font-weight: 700;
  }

  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0ea5e9, #6366f1, #0ea5e9);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="accent-bar"></div>

  <div class="tests">
    <div class="test-badge">SAT</div>
    <div class="test-badge">GRE</div>
    <div class="test-badge">GMAT</div>
  </div>

  <div class="headline">
    <h1>Study Abroad<br>Starts Here</h1>
    <p>Expert preparation for US university entrance exams</p>
  </div>

  <div class="divider"></div>

  <div class="features">
    <div class="feat">
      <span class="feat-icon">🏫</span>
      <span class="feat-text">US-educated specialist (CMU, Michigan)</span>
    </div>
    <div class="feat">
      <span class="feat-icon">📊</span>
      <span class="feat-text">Math taught in English</span>
    </div>
    <div class="feat">
      <span class="feat-icon">🎯</span>
      <span class="feat-text">15+ years SAT/GRE/GMAT results</span>
    </div>
    <div class="feat">
      <span class="feat-icon">👥</span>
      <span class="feat-text">Small groups & private sessions</span>
    </div>
  </div>

  <div class="bottom">
    <div class="brand">
      <img src="../public/logo.png" alt="Logo">
      <div class="brand-name">Galstyan Academy</div>
    </div>
    <div class="cta-pill">Free trial → +374 94 766-409</div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
